<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Desafio - Brake Trainer Pro Web</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="challenge">
  <header class="site-header">
    <h1>Desafio</h1>
  </header>

  <main class="page-container">
    <section class="challenge-card">
      <div class="challenge-row">
        <div>
          <h2>Target</h2>
          <p id="challenge-target">50%</p>
        </div>
        <div>
          <h2>Tempo</h2>
          <p id="challenge-time">0s</p>
        </div>
        <div>
          <h2>Leitura</h2>
          <p id="current-value">0%</p>
        </div>
      </div>
      <div class="challenge-visualizer" id="visualizer"></div>
      <div class="challenge-status">
        <p id="status-text">Aguardando dispositivo HID.</p>
      </div>
      <div class="button-row">
        <button id="start-challenge" class="button">Iniciar desafio</button>
        <a class="button" href="results.html">Ver resultados</a>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <a class="button" href="index.html">Voltar</a>
    <a class="button" href="settings.html">Configurações</a>
  </footer>

  <script src="app.js"></script>
</body>
</html>
